name = "docbuild"
reservoir = false
version = "0.1.0"
# doc-gen4 API reference for the Transfer library, isolated from the main package.
# Build from a fresh clone with its own .lake:
#   lake update && lake exe cache get && lake build Transfer:docs
# Output: .lake/build/doc/

[[require]]
name = "paramTransfer"
path = "../"

[[require]]
scope = "leanprover"
name = "doc-gen4"
# doc-gen4's `v4.30.0` tag is built for Lean v4.30.0 (this project's toolchain).
rev = "v4.30.0"

# mathlib last: its pinned transitive deps must win over doc-gen4's to match the
# published olean cache.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4"
rev = "v4.30.0"
